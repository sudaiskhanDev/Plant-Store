<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Panel</title>
 
  <style>
    /* ========== LOGIN PANEL - MINT CONTRAST THEME ========== */
/* Color Theme:
   Light Base: #FFFFFF (White)
   Highlight (Light): #90EE90 (Light Green / Mint)
   Navigation/Buttons: #358856 (Sea Green)
   Deep Text: #0C3823 (Rich Dark Green)
*/

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Roboto', 'Helvetica Neue', sans-serif;
    background: linear-gradient(135deg, #FFFFFF 0%, #F0FFF0 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 1.5rem;
    margin: 0;
    position: relative;
}

/* Subtle mint decorative background pattern */
body::before {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(circle at 20% 40%, rgba(144, 238, 144, 0.12) 2px, transparent 2px);
    background-size: 40px 40px;
    pointer-events: none;
}

/* ========== LOGIN PANEL CARD ========== */
.login-panel {
    background: #FFFFFF;
    max-width: 420px;
    width: 100%;
    padding: 2.5rem 2rem 2.8rem;
    border-radius: 1.8rem;
    box-shadow: 0 25px 50px -12px rgba(12, 56, 35, 0.25);
    transition: all 0.3s ease;
    border: 1px solid rgba(144, 238, 144, 0.3);
    position: relative;
    z-index: 1;
}

.login-panel:hover {
    transform: translateY(-4px);
    box-shadow: 0 30px 55px -15px rgba(53, 136, 86, 0.3);
    border-color: rgba(144, 238, 144, 0.5);
}

/* ========== HEADING ========== */
.login-panel h2 {
    font-size: 2.2rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 2rem;
    color: #0C3823;
    letter-spacing: -0.5px;
    position: relative;
}

/* Decorative mint underline */
.login-panel h2::after {
    content: '';
    display: block;
    width: 70px;
    height: 3px;
    background: linear-gradient(90deg, #90EE90, #358856);
    margin: 0.7rem auto 0;
    border-radius: 4px;
}

/* ========== FORM STYLES ========== */
#loginForm {
    display: flex;
    flex-direction: column;
    gap: 0;
}

/* ========== INPUT FIELDS ========== */
.login-panel input {
    width: 100%;
    padding: 1rem 1.2rem;
    margin-bottom: 1rem;
    border: 2px solid #E8F5E8;
    border-radius: 1rem;
    font-size: 1rem;
    font-weight: 500;
    background-color: #FFFFFF;
    transition: all 0.3s ease;
    outline: none;
    font-family: inherit;
    color: #0C3823;
}

/* input focus state */
.login-panel input:focus {
    border-color: #90EE90;
    box-shadow: 0 0 0 4px rgba(144, 238, 144, 0.2);
    background-color: #FFFFFF;
}

/* placeholder styling */
.login-panel input::placeholder {
    color: #B8D9B8;
    font-weight: 450;
    font-size: 0.92rem;
    letter-spacing: 0.2px;
}

/* ========== LOGIN BUTTON ========== */
.login-panel button {
    width: 100%;
    background: #358856;
    border: none;
    padding: 1rem 1rem;
    border-radius: 2rem;
    font-size: 1rem;
    font-weight: 700;
    color: white;
    margin-top: 0.5rem;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: inherit;
    letter-spacing: 0.5px;
    box-shadow: 0 4px 12px rgba(53, 136, 86, 0.3);
    position: relative;
    overflow: hidden;
}

/* subtle shine effect */
.login-panel button::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -60%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 70%);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
}

.login-panel button:hover::after {
    opacity: 0.5;
}

.login-panel button:hover {
    background: #2a6d44;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(53, 136, 86, 0.4);
}

.login-panel button:active {
    transform: translateY(1px);
    transition: 0.05s;
}

/* ========== MESSAGE STYLES ========== */
.msg {
    margin-top: 1.2rem;
    padding: 0.8rem 1rem;
    border-radius: 0.8rem;
    font-size: 0.9rem;
    font-weight: 500;
    text-align: center;
    background: #F9F9F9;
    transition: all 0.3s ease;
}

/* ========== ANIMATION FOR PANEL ========== */
@keyframes fadeInScale {
    0% {
        opacity: 0;
        transform: scale(0.95) translateY(20px);
    }
    100% {
        opacity: 1;
        transform: scale(1) translateY(0);
    }
}

.login-panel {
    animation: fadeInScale 0.5s ease-out;
}

/* ========== RESPONSIVE DESIGN ========== */

/* Tablet */
@media (max-width: 500px) {
    .login-panel {
        padding: 2rem 1.5rem 2.2rem;
        max-width: 95%;
        border-radius: 1.5rem;
    }
    
    .login-panel h2 {
        font-size: 1.8rem;
        margin-bottom: 1.5rem;
    }
    
    .login-panel h2::after {
        width: 55px;
        height: 2.5px;
    }
    
    .login-panel input {
        padding: 0.85rem 1rem;
        font-size: 0.95rem;
        margin-bottom: 0.85rem;
    }
    
    .login-panel button {
        padding: 0.85rem;
        font-size: 0.95rem;
    }
    
    .msg {
        font-size: 0.85rem;
        padding: 0.7rem 0.9rem;
    }
}

/* Small Mobile */
@media (max-width: 380px) {
    body {
        padding: 1rem;
    }
    
    .login-panel {
        padding: 1.5rem 1.2rem 1.8rem;
        border-radius: 1.2rem;
    }
    
    .login-panel h2 {
        font-size: 1.5rem;
        margin-bottom: 1.2rem;
    }
    
    .login-panel h2::after {
        width: 45px;
        height: 2px;
    }
    
    .login-panel input {
        padding: 0.7rem 0.9rem;
        font-size: 0.9rem;
        margin-bottom: 0.8rem;
    }
    
    .login-panel button {
        padding: 0.7rem;
        font-size: 0.9rem;
    }
    
    .msg {
        font-size: 0.8rem;
        padding: 0.6rem 0.8rem;
    }
}

/* Extra Small */
@media (max-width: 280px) {
    .login-panel {
        padding: 1.2rem 1rem 1.5rem;
    }
    
    .login-panel h2 {
        font-size: 1.3rem;
    }
    
    .login-panel input {
        padding: 0.6rem 0.8rem;
        font-size: 0.85rem;
    }
    
    .login-panel button {
        padding: 0.6rem;
        font-size: 0.85rem;
    }
}

/* ========== AUTOFILL STYLES ========== */
.login-panel input:-webkit-autofill,
.login-panel input:-webkit-autofill:hover,
.login-panel input:-webkit-autofill:focus {
    -webkit-box-shadow: 0 0 0px 1000px #FFFFFF inset;
    -webkit-text-fill-color: #0C3823;
    border-color: #90EE90;
    transition: background-color 5000s ease-in-out 0s;
}

/* ========== FOCUS VISIBLE ACCESSIBILITY ========== */
.login-panel button:focus-visible,
.login-panel input:focus-visible {
    outline: 2px solid #358856;
    outline-offset: 2px;
}

/* ========== TOUCH-FRIENDLY ADJUSTMENTS ========== */
@media (hover: none) and (pointer: coarse) {
    .login-panel button:hover {
        transform: none;
        background: #358856;
    }
    
    .login-panel button:active {
        transform: scale(0.97);
        background: #2a6d44;
    }
}
  </style>
</head>

<body>

<div class="login-panel">
  <h2>Login</h2>

  <form id="loginForm">
    <input type="text" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  <div class="msg" id="msg"></div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let msg = document.getElementById("msg");

    msg.innerText = "";

    try {
        let res = await fetch("http://127.0.0.1:8000/api/auth/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, password })
        });

        let data = await res.json();

        // ❌ LOGIN FAILED
        if (!data.status) {
            msg.innerText = data.message || "Login failed";
            msg.style.color = "red";
            return;
        }

        let role = data.user.role;

        // ❌ ONLY ALLOW ADMIN + STAFF
        if (role !== "Admin" && role !== "Staff") {
            msg.innerText = "Access denied: Only Admin or Staff can login.";
            msg.style.color = "red";

            localStorage.removeItem("token");
            localStorage.removeItem("user");
            return;
        }

        // ✅ SAVE SESSION
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));

        msg.innerText = "Login successful!";
        msg.style.color = "green";

        // 🚀 REDIRECT BY ROLE
        setTimeout(() => {
            if (role === "Admin") {
                window.location.href = "Admin/Html/Admin.html";
            } else if (role === "Staff") {
                window.location.href = "Staff/Html/staff.html";
            }
        }, 800);

    } catch (error) {
        msg.innerText = "Server error!";
        msg.style.color = "red";
    }
});
</script>

</body>
</html>
