<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>
 
 <style>
    /* ========== REGISTER PAGE - MINT CONTRAST THEME ========== */
/* Color Theme:
   Light Base: #FFFFFF (White)
   Highlight (Light): #90EE90 (Light Green / Mint)
   Navigation/Buttons: #358856 (Sea Green)
   Deep Text: #0C3823 (Rich Dark Green)
*/

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Roboto', 'Helvetica Neue', sans-serif;
    background: linear-gradient(135deg, #FFFFFF 0%, #F0FFF0 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 1.5rem;
    margin: 0;
    position: relative;
}

/* Subtle mint decorative background pattern */
body::before {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(circle at 20% 40%, rgba(144, 238, 144, 0.12) 2px, transparent 2px);
    background-size: 40px 40px;
    pointer-events: none;
}

/* ========== REGISTER CARD (.box) ========== */
.box {
    background: #FFFFFF;
    max-width: 420px;
    width: 100%;
    padding: 2.5rem 2rem 2.8rem;
    border-radius: 1.8rem;
    box-shadow: 0 25px 50px -12px rgba(12, 56, 35, 0.25);
    transition: all 0.3s ease;
    border: 1px solid rgba(144, 238, 144, 0.3);
    position: relative;
    z-index: 1;
}

.box:hover {
    transform: translateY(-4px);
    box-shadow: 0 30px 55px -15px rgba(53, 136, 86, 0.3);
    border-color: rgba(144, 238, 144, 0.5);
}

/* ========== HEADING (Register) ========== */
.box h2 {
    font-size: 2.2rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 2rem;
    color: #0C3823; /* Deep Text */
    letter-spacing: -0.5px;
    position: relative;
}

/* Decorative mint underline */
.box h2::after {
    content: '';
    display: block;
    width: 70px;
    height: 3px;
    background: linear-gradient(90deg, #90EE90, #358856);
    margin: 0.7rem auto 0;
    border-radius: 4px;
}

/* ========== INPUT FIELDS ========== */
.box input {
    width: 100%;
    padding: 1rem 1.2rem;
    margin-bottom: 1rem;
    border: 2px solid #E8F5E8;
    border-radius: 1rem;
    font-size: 1rem;
    font-weight: 500;
    background-color: #FFFFFF;
    transition: all 0.3s ease;
    outline: none;
    font-family: inherit;
    color: #0C3823;
}

/* input focus state */
.box input:focus {
    border-color: #90EE90;
    box-shadow: 0 0 0 4px rgba(144, 238, 144, 0.2);
    background-color: #FFFFFF;
}

/* placeholder styling */
.box input::placeholder {
    color: #B8D9B8;
    font-weight: 450;
    font-size: 0.92rem;
    letter-spacing: 0.2px;
}

/* ========== REGISTER BUTTON ========== */
.box button {
    width: 100%;
    background: #358856; /* Sea Green */
    border: none;
    padding: 1rem 1rem;
    border-radius: 2rem;
    font-size: 1rem;
    font-weight: 700;
    color: white;
    margin-top: 0.5rem;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: inherit;
    letter-spacing: 0.5px;
    box-shadow: 0 4px 12px rgba(53, 136, 86, 0.3);
    position: relative;
    overflow: hidden;
}

/* subtle shine effect */
.box button::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -60%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 70%);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
}

.box button:hover::after {
    opacity: 0.5;
}

.box button:hover {
    background: #2a6d44; /* Darker Sea Green */
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(53, 136, 86, 0.4);
}

.box button:active {
    transform: translateY(1px);
    transition: 0.05s;
}

/* ========== MESSAGE BOX (success / error) ========== */
#msg {
    margin-top: 1.2rem;
    padding: 0.8rem 1rem;
    border-radius: 0.8rem;
    font-size: 0.9rem;
    font-weight: 500;
    text-align: center;
    display: none;
    transition: all 0.3s ease;
}

/* success message */
#msg.success {
    display: block;
    background: #E8F5E8;
    border-left: 4px solid #358856;
    color: #0C3823;
    box-shadow: 0 2px 8px rgba(53, 136, 86, 0.1);
}

/* error message */
#msg.error {
    display: block;
    background: #FFF0F0;
    border-left: 4px solid #e74c3c;
    color: #c0392b;
    box-shadow: 0 2px 8px rgba(231, 76, 60, 0.08);
}

/* ========== ANIMATION FOR MESSAGE ========== */
@keyframes fadeSlideUp {
    0% {
        opacity: 0;
        transform: translateY(-8px);
    }
    100% {
        opacity: 1;
        transform: translateY(0);
    }
}

#msg.success, #msg.error {
    animation: fadeSlideUp 0.3s ease forwards;
}

/* ========== LINK STYLES ========== */
.box a {
    display: inline-block;
    text-align: center;
    width: 100%;
    margin-top: 1rem;
    color: #358856;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.9rem;
    transition: all 0.3s ease;
    letter-spacing: 0.2px;
    background: transparent;
}

.box a:hover {
    color: #0C3823;
    text-decoration: underline;
    text-underline-offset: 5px;
    transform: translateX(3px);
}

/* ========== ANIMATION FOR CARD ========== */
@keyframes fadeInScale {
    0% {
        opacity: 0;
        transform: scale(0.95) translateY(20px);
    }
    100% {
        opacity: 1;
        transform: scale(1) translateY(0);
    }
}

.box {
    animation: fadeInScale 0.5s ease-out;
}

/* ========== RESPONSIVE DESIGN ========== */

/* Tablet */
@media (max-width: 500px) {
    .box {
        padding: 2rem 1.5rem 2.2rem;
        max-width: 95%;
        border-radius: 1.5rem;
    }
    
    .box h2 {
        font-size: 1.8rem;
        margin-bottom: 1.5rem;
    }
    
    .box h2::after {
        width: 55px;
        height: 2.5px;
    }
    
    .box input {
        padding: 0.85rem 1rem;
        font-size: 0.95rem;
        margin-bottom: 0.85rem;
    }
    
    .box button {
        padding: 0.85rem;
        font-size: 0.95rem;
    }
    
    #msg {
        font-size: 0.85rem;
        padding: 0.7rem 0.9rem;
    }
    
    .box a {
        font-size: 0.85rem;
    }
}

/* Small Mobile */
@media (max-width: 380px) {
    body {
        padding: 1rem;
    }
    
    .box {
        padding: 1.5rem 1.2rem 1.8rem;
        border-radius: 1.2rem;
    }
    
    .box h2 {
        font-size: 1.5rem;
        margin-bottom: 1.2rem;
    }
    
    .box h2::after {
        width: 45px;
        height: 2px;
    }
    
    .box input {
        padding: 0.7rem 0.9rem;
        font-size: 0.9rem;
        margin-bottom: 0.8rem;
    }
    
    .box button {
        padding: 0.7rem;
        font-size: 0.9rem;
    }
    
    #msg {
        font-size: 0.8rem;
        padding: 0.6rem 0.8rem;
    }
    
    .box a {
        font-size: 0.8rem;
    }
}

/* Extra Small */
@media (max-width: 280px) {
    .box {
        padding: 1.2rem 1rem 1.5rem;
    }
    
    .box h2 {
        font-size: 1.3rem;
    }
    
    .box input {
        padding: 0.6rem 0.8rem;
        font-size: 0.85rem;
    }
    
    .box button {
        padding: 0.6rem;
        font-size: 0.85rem;
    }
}

/* ========== AUTOFILL STYLES ========== */
.box input:-webkit-autofill,
.box input:-webkit-autofill:hover,
.box input:-webkit-autofill:focus {
    -webkit-box-shadow: 0 0 0px 1000px #FFFFFF inset;
    -webkit-text-fill-color: #0C3823;
    border-color: #90EE90;
    transition: background-color 5000s ease-in-out 0s;
}

/* ========== FOCUS VISIBLE ACCESSIBILITY ========== */
.box button:focus-visible,
.box input:focus-visible {
    outline: 2px solid #358856;
    outline-offset: 2px;
}

/* ========== TOUCH-FRIENDLY ADJUSTMENTS ========== */
@media (hover: none) and (pointer: coarse) {
    .box button:hover {
        transform: none;
        background: #358856;
    }
    
    .box button:active {
        transform: scale(0.97);
        background: #2a6d44;
    }
    
    .box a:hover {
        transform: none;
    }
}

/* ========== LOADING STATE FOR BUTTON (optional) ========== */
.box button.loading {
    background: #2a6d44;
    cursor: wait;
    opacity: 0.8;
}

.box button.loading::after {
    display: none;
}
 </style>

</head>
<body>

<div class="box">

  <h2>Register</h2>

  <input type="text" id="name" placeholder="Name">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="register()">Register</button>

  <div id="msg"></div>

  <a href="./Login.html">Already have an account? Login</a>

</div>

<script>

// 🔥 MESSAGE FUNCTION
function showMessage(type, text) {
  let msg = document.getElementById("msg");
  msg.style.display = "block";
  msg.className = type;
  msg.innerText = text;
}

// 🔥 REGISTER FUNCTION (FINAL FIXED)
async function register() {

  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  // validation
  if (!name || !email || !password) {
    showMessage("error", "All fields are required ❌");
    return;
  }

  try {
    let res = await fetch("http://localhost:8000/api/auth/customer-register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: name,
        email: email,
        password: password
      })
    });

    let data = await res.json();

    console.log(data); // 🔥 DEBUG (optional)

    if (data.status) {

      showMessage("success", "Registered successfully ✔️ Redirecting...");

      setTimeout(() => {
        window.location.href = "./Login.html";
      }, 1200);

    } else {

      let errorText = "Register failed ❌";

      if (data.errors) {
        errorText = Object.values(data.errors).flat().join(", ");
      }

      showMessage("error", errorText);
    }

  } catch (err) {
    console.log(err);
    showMessage("error", "Server error ❌ Check API or CORS");
  }
}

</script>

</body>
</html>
