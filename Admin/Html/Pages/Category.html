<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link rel="stylesheet" href="../../Css/Admin Dashboard.css">

<style>
    /* ========== CATEGORY MANAGEMENT - MINT CONTRAST THEME ========== */
/* Color Theme:
   Light Base: #FFFFFF (White)
   Highlight (Light): #90EE90 (Light Green / Mint)
   Navigation/Buttons: #358856 (Sea Green)
   Deep Text: #0C3823 (Rich Dark Green)
*/

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Roboto', 'Helvetica Neue', sans-serif;
    background: #FFFFFF;
    min-height: 100vh;
}

/* ========== MAIN CONTAINER ========== */
.mian {
    display: flex;
    min-height: 100vh;
    width: 100%;
    background: #FFFFFF;
}

/* ========== DASHBOARD CONTENT (Category Management Area) ========== */
.dashboard-content {
    flex: 1;
    padding: 2rem;
    background: #FFFFFF;
    transition: all 0.3s ease;
}

/* Heading */
.dashboard-content h2 {
    font-size: 1.8rem;
    font-weight: 700;
    color: #0C3823;
    margin-bottom: 1.5rem;
    letter-spacing: -0.3px;
    position: relative;
    display: inline-block;
}

.dashboard-content h2::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 0;
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, #90EE90, #358856);
    border-radius: 3px;
}

/* ========== INPUT AREA ========== */
.dashboard-content div[style*="margin-bottom:15px"] {
    display: flex;
    gap: 1rem;
    margin: 1.5rem 0 2rem 0 !important;
    flex-wrap: wrap;
    align-items: center;
}

.dashboard-content input[type="text"] {
    flex: 1;
    min-width: 250px;
    padding: 0.85rem 1.2rem;
    border: 2px solid #E8F5E8;
    border-radius: 1rem;
    font-size: 1rem;
    font-weight: 500;
    background-color: #FFFFFF;
    transition: all 0.3s ease;
    outline: none;
    font-family: inherit;
    color: #0C3823;
}

.dashboard-content input[type="text"]:focus {
    border-color: #90EE90;
    box-shadow: 0 0 0 4px rgba(144, 238, 144, 0.2);
}

.dashboard-content input[type="text"]::placeholder {
    color: #B8D9B8;
    font-weight: 450;
}

/* ========== BUTTONS ========== */
.dashboard-content button {
    background: #358856;
    border: none;
    padding: 0.85rem 1.8rem;
    border-radius: 2rem;
    font-size: 0.95rem;
    font-weight: 600;
    color: white;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: inherit;
    letter-spacing: 0.3px;
    box-shadow: 0 2px 8px rgba(53, 136, 86, 0.25);
}

.dashboard-content button:hover {
    background: #2a6d44;
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(53, 136, 86, 0.35);
}

.dashboard-content button:active {
    transform: translateY(1px);
}

/* ========== TABLE STYLES ========== */
.dashboard-content table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    background: #FFFFFF;
    border-radius: 1rem;
    overflow: hidden;
    box-shadow: 0 4px 12px rgba(12, 56, 35, 0.05);
}

.dashboard-content th,
.dashboard-content td {
    border: 1px solid #E8F5E8;
    padding: 12px;
    text-align: center;
    color: #0C3823;
}

.dashboard-content th {
    background: #F0FFF0;
    font-weight: 700;
    font-size: 0.95rem;
    color: #0C3823;
    border-bottom: 2px solid #90EE90;
}

.dashboard-content td {
    font-size: 0.95rem;
}

/* Action Buttons inside table */
.dashboard-content table button {
    padding: 6px 14px;
    margin: 0 4px;
    font-size: 0.85rem;
    font-weight: 600;
    border: none;
    border-radius: 1.5rem;
    cursor: pointer;
    transition: all 0.2s ease;
}

/* Edit button (orange -> sea green variant) */
.dashboard-content table button:first-of-type {
    background: #358856;
    color: white;
}

.dashboard-content table button:first-of-type:hover {
    background: #2a6d44;
    transform: translateY(-1px);
}

/* Delete button (red) */
.dashboard-content table button:last-of-type {
    background: #c0392b;
    color: white;
}

.dashboard-content table button:last-of-type:hover {
    background: #a93226;
    transform: translateY(-1px);
}

/* ========== RESPONSIVE DESIGN ========== */

/* Tablet */
@media (max-width: 900px) {
    .dashboard-content {
        padding: 1.5rem;
    }
    
    .dashboard-content h2 {
        font-size: 1.5rem;
    }
    
    .dashboard-content input[type="text"] {
        padding: 0.75rem 1rem;
    }
    
    .dashboard-content button {
        padding: 0.75rem 1.5rem;
    }
    
    .dashboard-content th,
    .dashboard-content td {
        padding: 10px;
    }
}

/* Mobile Landscape */
@media (max-width: 768px) {
    .dashboard-content {
        padding: 1rem;
    }
    
    .dashboard-content div[style*="margin-bottom:15px"] {
        flex-direction: column;
        align-items: stretch;
    }
    
    .dashboard-content input[type="text"] {
        width: 100%;
        min-width: auto;
    }
    
    .dashboard-content button {
        width: 100%;
        text-align: center;
    }
    
    /* Make table horizontally scrollable */
    .dashboard-content table {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
    }
    
    .dashboard-content th,
    .dashboard-content td {
        white-space: nowrap;
    }
    
    .dashboard-content table button {
        padding: 5px 10px;
    }
}

/* Small Mobile */
@media (max-width: 480px) {
    .dashboard-content h2 {
        font-size: 1.3rem;
    }
    
    .dashboard-content input[type="text"] {
        padding: 0.7rem 0.9rem;
        font-size: 0.9rem;
    }
    
    .dashboard-content button {
        padding: 0.7rem;
        font-size: 0.9rem;
    }
    
    .dashboard-content th,
    .dashboard-content td {
        padding: 8px;
        font-size: 0.85rem;
    }
    
    .dashboard-content table button {
        padding: 4px 8px;
        font-size: 0.75rem;
    }
}

/* ========== ANIMATION ========== */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.dashboard-content {
    animation: fadeInUp 0.4s ease-out;
}

/* ========== TOUCH-FRIENDLY ADJUSTMENTS ========== */
@media (hover: none) and (pointer: coarse) {
    .dashboard-content button:hover {
        transform: none;
    }
    
    .dashboard-content button:active {
        transform: scale(0.96);
    }
}
</style>

</head>

<body>

<div class="mian">

    <!-- SIDEBAR -->
    <div class="side-bar">
        <h1>Admin Dashboard</h1>

        <div class="pages-links">
                <ul>
                    <a href="../Admin.html"><li>Home</li></a>
                    <a href="./Category.html"><li>Category</li></a>
                    <a href="./Plants.html"><li>Add Plants</li></a>
                    <a href="./Order.html"><li>Order</li></a>
                    <a href="./OrderDetail.html"><li> Order Details</li></a>
                    <a href="./Payments.html"><li>Payments</li></a>
                    <a href="./Supplier.html"><li>Supplier</li></a>
                    <a href="./SupplierOrder.html"><li>Supplier Order</li></a>
                    <a href="./Maintenance.html"><li>Maintenance</li></a>
                    <a href="./Notification.html"><li>Notification</li></a>
                    
                </ul>
            </div>
    </div>

    <!-- CONTENT -->
    <div class="dashboard-content">

    <h2>Category Management</h2>

    <!-- INPUT -->
    <div style="margin-bottom:15px;">
        <input type="text" id="category_name" placeholder="Enter category name">
        <button onclick="saveCategory()">Add / Update</button>
    </div>

    <!-- TABLE -->
    <table border="1" width="100%" cellpadding="10">
        <thead>
            <tr>
                <th>ID</th>
                <th>Category Name</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody id="tableData"></tbody>
    </table>

</div>

</div>

 <script>

const API = "http://127.0.0.1:8000/api/categories";
let editId = null;

function getToken() {
    return localStorage.getItem("token");
}

/* LOAD DATA */
async function loadCategories() {

    let res = await fetch(API, {
        headers: {
            "Authorization": "Bearer " + getToken()
        }
    });

    let data = await res.json();

    let rows = "";

    data.data.forEach(cat => {
        rows += `
        <tr>
            <td>${cat.category_id}</td>
            <td>${cat.category_name}</td>
            <td>
                <button onclick="editCategory(${cat.category_id}, \`${cat.category_name}\`)">Edit</button>
                <button onclick="deleteCategory(${cat.category_id})">Delete</button>
            </td>
        </tr>
        `;
    });

    document.getElementById("tableData").innerHTML = rows;
}

/* ADD / UPDATE */
async function saveCategory() {

    let name = document.getElementById("category_name").value;

    if (!name) return alert("Enter category name");

    let url = API;
    let method = "POST";

    if (editId) {
        url = API + "/" + editId;
        method = "PUT";
    }

    let res = await fetch(url, {
        method: method,
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + getToken()
        },
        body: JSON.stringify({ category_name: name })
    });

    let data = await res.json();

    if (!data.status) {
        alert(data.message || "Failed");
        return;
    }

    document.getElementById("category_name").value = "";
    editId = null;

    loadCategories();
}

/* EDIT → LOAD INTO INPUT */
function editCategory(id, name) {
    document.getElementById("category_name").value = name;
    editId = id;
}

/* DELETE */
async function deleteCategory(id) {

    if (!confirm("Delete this category?")) return;

    let res = await fetch(API + "/" + id, {
        method: "DELETE",
        headers: {
            "Authorization": "Bearer " + getToken()
        }
    });

    let data = await res.json();

    if (!data.status) {
        alert(data.message || "Delete failed");
        return;
    }

    loadCategories();
}

/* INIT */
loadCategories();

</script>
</body>
</html>
