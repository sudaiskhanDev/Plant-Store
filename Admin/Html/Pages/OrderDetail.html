<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../Css/Admin Dashboard.css">
    <style>
        /* ========== ORDER DETAILS CRUD - MINT CONTRAST THEME (NO SIDEBAR) ========== */
/* Color Theme:
   Light Base: #FFFFFF (White)
   Highlight (Light): #90EE90 (Light Green / Mint)
   Buttons: #358856 (Sea Green)
   Deep Text: #0C3823 (Rich Dark Green)
*/

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Roboto', 'Helvetica Neue', sans-serif;
    background: #FFFFFF;
    min-height: 100vh;
}

/* ========== ADMIN DASHBOARD LAYOUT (sidebar exists but we skip styling it) ========== */
.admin-dashboard {
    display: flex;
    min-height: 100vh;
    width: 100%;
    background: #FFFFFF;
}

/* ========== DASHBOARD CONTENT (only this part gets styled) ========== */
.dashboard-content {
    flex: 1;
    padding: 2rem;
    background: #FFFFFF;
    transition: all 0.3s ease;
}

/* Heading */
.dashboard-content h2 {
    font-size: 1.8rem;
    font-weight: 700;
    color: #0C3823;
    margin-bottom: 1.5rem;
    letter-spacing: -0.3px;
    position: relative;
    display: inline-block;
}

.dashboard-content h2::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 0;
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, #90EE90, #358856);
    border-radius: 3px;
}

/* ========== FORM STYLES ========== */
.dashboard-content form {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 2rem;
    align-items: flex-end;
    background: #FFFFFF;
    padding: 1rem 0;
}

.dashboard-content select,
.dashboard-content input {
    flex: 1;
    min-width: 160px;
    padding: 0.85rem 1.2rem;
    border: 2px solid #E8F5E8;
    border-radius: 1rem;
    font-size: 1rem;
    font-weight: 500;
    background-color: #FFFFFF;
    transition: all 0.3s ease;
    outline: none;
    font-family: inherit;
    color: #0C3823;
}

.dashboard-content select:focus,
.dashboard-content input:focus {
    border-color: #90EE90;
    box-shadow: 0 0 0 4px rgba(144, 238, 144, 0.2);
}

.dashboard-content input::placeholder {
    color: #B8D9B8;
    font-weight: 450;
}

/* Select dropdown arrow */
.dashboard-content select {
    cursor: pointer;
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23358856' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
    background-repeat: no-repeat;
    background-position: right 1rem center;
    background-size: 1rem;
}

/* Save Button */
.dashboard-content button {
    background: #358856;
    border: none;
    padding: 0.85rem 1.8rem;
    border-radius: 2rem;
    font-size: 0.95rem;
    font-weight: 600;
    color: white;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: inherit;
    letter-spacing: 0.3px;
    box-shadow: 0 2px 8px rgba(53, 136, 86, 0.25);
}

.dashboard-content button:hover {
    background: #2a6d44;
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(53, 136, 86, 0.35);
}

.dashboard-content button:active {
    transform: translateY(1px);
}

/* ========== TABLE STYLES ========== */
.dashboard-content table {
    width: 100%;
    border-collapse: collapse;
    background: #FFFFFF;
    border-radius: 1rem;
    overflow: hidden;
    box-shadow: 0 4px 12px rgba(12, 56, 35, 0.05);
    margin-top: 1rem;
}

.dashboard-content th,
.dashboard-content td {
    border: 1px solid #E8F5E8;
    padding: 12px;
    text-align: center;
    color: #0C3823;
}

.dashboard-content th {
    background: #F0FFF0;
    font-weight: 700;
    font-size: 0.95rem;
    color: #0C3823;
    border-bottom: 2px solid #90EE90;
}

.dashboard-content td {
    font-size: 0.95rem;
}

/* Action Buttons inside table */
.dashboard-content table button {
    padding: 6px 14px;
    margin: 0 4px;
    font-size: 0.85rem;
    font-weight: 600;
    border: none;
    border-radius: 1.5rem;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: none;
}

/* Edit button */
.dashboard-content table button:first-of-type {
    background: #358856;
    color: white;
}

.dashboard-content table button:first-of-type:hover {
    background: #2a6d44;
    transform: translateY(-1px);
}

/* Delete button */
.dashboard-content table button:last-of-type {
    background: #c0392b;
    color: white;
}

.dashboard-content table button:last-of-type:hover {
    background: #a93226;
    transform: translateY(-1px);
}

/* ========== RESPONSIVE DESIGN ========== */

/* Tablet */
@media (max-width: 900px) {
    .dashboard-content {
        padding: 1.5rem;
    }
    
    .dashboard-content h2 {
        font-size: 1.5rem;
    }
    
    .dashboard-content select,
    .dashboard-content input {
        min-width: 140px;
    }
}

/* Mobile Landscape */
@media (max-width: 768px) {
    .dashboard-content {
        padding: 1rem;
    }
    
    .dashboard-content form {
        flex-direction: column;
        align-items: stretch;
    }
    
    .dashboard-content select,
    .dashboard-content input {
        width: 100%;
        min-width: auto;
    }
    
    .dashboard-content button {
        width: 100%;
        text-align: center;
    }
    
    /* Horizontal scroll for table */
    .dashboard-content table {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
    }
    
    .dashboard-content th,
    .dashboard-content td {
        white-space: nowrap;
    }
    
    .dashboard-content table button {
        padding: 5px 10px;
    }
}

/* Small Mobile */
@media (max-width: 480px) {
    .dashboard-content h2 {
        font-size: 1.3rem;
    }
    
    .dashboard-content select,
    .dashboard-content input {
        padding: 0.7rem 0.9rem;
        font-size: 0.9rem;
    }
    
    .dashboard-content button {
        padding: 0.7rem;
        font-size: 0.9rem;
    }
    
    .dashboard-content th,
    .dashboard-content td {
        padding: 8px;
        font-size: 0.85rem;
    }
    
    .dashboard-content table button {
        padding: 4px 8px;
        font-size: 0.75rem;
    }
}

/* ========== ANIMATION ========== */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.dashboard-content {
    animation: fadeInUp 0.4s ease-out;
}

/* ========== TOUCH-FRIENDLY ADJUSTMENTS ========== */
@media (hover: none) and (pointer: coarse) {
    .dashboard-content button:hover {
        transform: none;
    }
    
    .dashboard-content button:active {
        transform: scale(0.96);
    }
}
    </style>
    <title>Document</title>
</head>
<body>
      <div class="admin-dashboard">

        <!-- Sidebar containing navigation links for admin modules -->
        <div class="side-bar">
            <h1>Admin Dashboard</h1>

            <div class="pages-links">
                <ul>
                    <a href="./Admin.html"><li>Home</li></a>
                    <a href="./Pages/Category.html"><li>Category</li></a>
                    <a href="./Pages/Plants.html"><li>Add Plants</li></a>
                    <a href="./Pages/Order.html"><li>Order</li></a>
                </ul>
            </div>
        </div>
        

        

<div class="dashboard-content">

<h2>Order Details CRUD</h2>

<!-- FORM -->
<form>

<input type="hidden" id="edit_id">

<!-- DROPDOWNS -->
<select id="order_id">
    <option value="">Select Order</option>
</select>

<select id="plant_id">
    <option value="">Select Plant</option>
</select>

<input type="number" id="quantity" placeholder="Quantity">
<input type="number" id="price" placeholder="Price">

<button type="button" onclick="saveData()">Save</button>

</form>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>ID</th>
<th>Order</th>
<th>Plant</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableData"></tbody>
</table>

</div>




    </div>









    <script>

const API = "http://127.0.0.1:8000/api/order-details";
const ORDER_API = "http://127.0.0.1:8000/api/orders";
const PLANT_API = "http://127.0.0.1:8000/api/plants";


// ================= LOAD TABLE =================
function loadData() {
fetch(API)
.then(res => res.json())
.then(res => {

let rows = "";

res.data.forEach(item => {
rows += `
<tr>
<td>${item.order_detail_id}</td>
<td>${item.order_id}</td>
<td>${item.plant_id}</td>
<td>${item.quantity}</td>
<td>${item.price}</td>
<td>${item.quantity * item.price}</td>
<td>
<button onclick="editData(${item.order_detail_id}, ${item.order_id}, ${item.plant_id}, ${item.quantity}, ${item.price})">Edit</button>
<button onclick="deleteData(${item.order_detail_id})">Delete</button>
</td>
</tr>
`;
});

document.getElementById("tableData").innerHTML = rows;

});
}


// ================= DROPDOWNS =================
function loadDropdowns() {

// ORDERS
fetch(ORDER_API)
.then(res => res.json())
.then(res => {

let opt = `<option value="">Select Order</option>`;

res.data.forEach(o => {
opt += `<option value="${o.order_id}">Order #${o.order_id}</option>`;
});

document.getElementById("order_id").innerHTML = opt;

});

// PLANTS
fetch(PLANT_API)
.then(res => res.json())
.then(res => {

let opt = `<option value="">Select Plant</option>`;

res.data.forEach(p => {
opt += `<option value="${p.plant_id}">${p.name}</option>`;
});

document.getElementById("plant_id").innerHTML = opt;

});
}


// ================= SAVE (CREATE + UPDATE) =================
function saveData() {

let id = document.getElementById("edit_id").value;

let data = {
order_id: document.getElementById("order_id").value,
plant_id: document.getElementById("plant_id").value,
quantity: document.getElementById("quantity").value,
price: document.getElementById("price").value
};

let method = "POST";
let url = API;

if(id){
method = "PUT";
url = `${API}/${id}`;
}

fetch(url,{
method:method,
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
})
.then(res=>res.json())
.then(()=>{
alert("Saved Successfully");
clearForm();
loadData();
});

}


// ================= EDIT =================
function editData(id, order_id, plant_id, quantity, price){

document.getElementById("edit_id").value = id;
document.getElementById("order_id").value = order_id;
document.getElementById("plant_id").value = plant_id;
document.getElementById("quantity").value = quantity;
document.getElementById("price").value = price;

}


// ================= DELETE =================
function deleteData(id){

if(!confirm("Are you sure?")) return;

fetch(`${API}/${id}`,{
method:"DELETE"
})
.then(res=>res.json())
.then(()=>{
alert("Deleted");
loadData();
});

}


// ================= CLEAR =================
function clearForm(){
document.getElementById("edit_id").value = "";
document.getElementById("order_id").value = "";
document.getElementById("plant_id").value = "";
document.getElementById("quantity").value = "";
document.getElementById("price").value = "";
}


// INIT
loadData();
loadDropdowns();

</script>
</body>
</html>
