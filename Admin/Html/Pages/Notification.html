<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../../Css/Admin Dashboard.css">
 <style>
        /* ========== NOTIFICATIONS CRUD - MINT CONTRAST THEME (NO SIDEBAR) ========== */
/* Color Theme:
   Light Base: #FFFFFF (White)
   Highlight (Light): #90EE90 (Light Green / Mint)
   Buttons: #358856 (Sea Green)
   Deep Text: #0C3823 (Rich Dark Green)
*/

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Roboto', 'Helvetica Neue', sans-serif;
    background: #FFFFFF;
    min-height: 100vh;
}

/* ========== ADMIN DASHBOARD LAYOUT (sidebar exists but we skip styling it) ========== */
.admin-dashboard {
    display: flex;
    min-height: 100vh;
    width: 100%;
    background: #FFFFFF;
}

/* ========== DASHBOARD CONTENT (only this part gets styled) ========== */
.dashboard-content {
    flex: 1;
    padding: 2rem;
    background: #FFFFFF;
    transition: all 0.3s ease;
}

/* Heading */
.dashboard-content h2 {
    font-size: 1.8rem;
    font-weight: 700;
    color: #0C3823;
    margin-bottom: 1.5rem;
    letter-spacing: -0.3px;
    position: relative;
    display: inline-block;
}

.dashboard-content h2::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 0;
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, #90EE90, #358856);
    border-radius: 3px;
}

/* ========== FORM SECTION ========== */
.dashboard-content div[style*="background:#fff;padding:10px;margin-bottom:20px;"] {
    background: #FFFFFF !important;
    padding: 1rem !important;
    margin-bottom: 2rem !important;
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    align-items: flex-end;
    border-radius: 1rem;
    box-shadow: 0 2px 8px rgba(12, 56, 35, 0.05);
}

.dashboard-content select,
.dashboard-content input {
    flex: 1;
    min-width: 150px;
    padding: 0.85rem 1.2rem;
    border: 2px solid #E8F5E8;
    border-radius: 1rem;
    font-size: 1rem;
    font-weight: 500;
    background-color: #FFFFFF;
    transition: all 0.3s ease;
    outline: none;
    font-family: inherit;
    color: #0C3823;
}

.dashboard-content select:focus,
.dashboard-content input:focus {
    border-color: #90EE90;
    box-shadow: 0 0 0 4px rgba(144, 238, 144, 0.2);
}

.dashboard-content input::placeholder {
    color: #B8D9B8;
    font-weight: 450;
}

/* Select dropdown arrow */
.dashboard-content select {
    cursor: pointer;
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23358856' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
    background-repeat: no-repeat;
    background-position: right 1rem center;
    background-size: 1rem;
}

/* Save Button */
.dashboard-content button {
    background: #358856;
    border: none;
    padding: 0.85rem 1.8rem;
    border-radius: 2rem;
    font-size: 0.95rem;
    font-weight: 600;
    color: white;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: inherit;
    letter-spacing: 0.3px;
    box-shadow: 0 2px 8px rgba(53, 136, 86, 0.25);
}

.dashboard-content button:hover {
    background: #2a6d44;
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(53, 136, 86, 0.35);
}

.dashboard-content button:active {
    transform: translateY(1px);
}

/* ========== TABLE STYLES ========== */
.dashboard-content table {
    width: 100%;
    border-collapse: collapse;
    background: #FFFFFF;
    border-radius: 1rem;
    overflow: hidden;
    box-shadow: 0 4px 12px rgba(12, 56, 35, 0.05);
    margin-top: 1rem;
}

.dashboard-content th,
.dashboard-content td {
    border: 1px solid #E8F5E8;
    padding: 12px;
    text-align: center;
    color: #0C3823;
}

.dashboard-content th {
    background: #F0FFF0;
    font-weight: 700;
    font-size: 0.95rem;
    color: #0C3823;
    border-bottom: 2px solid #90EE90;
}

.dashboard-content td {
    font-size: 0.95rem;
}

/* Action Buttons inside table */
.dashboard-content table button {
    padding: 6px 14px;
    margin: 0 4px;
    font-size: 0.85rem;
    font-weight: 600;
    border: none;
    border-radius: 1.5rem;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: none;
}

/* Edit button */
.dashboard-content table button:first-of-type {
    background: #358856;
    color: white;
}

.dashboard-content table button:first-of-type:hover {
    background: #2a6d44;
    transform: translateY(-1px);
}

/* Delete button */
.dashboard-content table button:last-of-type {
    background: #c0392b;
    color: white;
}

.dashboard-content table button:last-of-type:hover {
    background: #a93226;
    transform: translateY(-1px);
}

/* ========== RESPONSIVE DESIGN ========== */

/* Tablet */
@media (max-width: 900px) {
    .dashboard-content {
        padding: 1.5rem;
    }
    
    .dashboard-content h2 {
        font-size: 1.5rem;
    }
    
    .dashboard-content select,
    .dashboard-content input {
        min-width: 130px;
    }
}

/* Mobile Landscape */
@media (max-width: 768px) {
    .dashboard-content {
        padding: 1rem;
    }
    
    .dashboard-content div[style*="background:#fff;padding:10px;margin-bottom:20px;"] {
        flex-direction: column;
        align-items: stretch;
    }
    
    .dashboard-content select,
    .dashboard-content input {
        width: 100%;
        min-width: auto;
    }
    
    .dashboard-content button {
        width: 100%;
        text-align: center;
    }
    
    /* Horizontal scroll for table */
    .dashboard-content table {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
    }
    
    .dashboard-content th,
    .dashboard-content td {
        white-space: nowrap;
    }
    
    .dashboard-content table button {
        padding: 5px 10px;
    }
}

/* Small Mobile */
@media (max-width: 480px) {
    .dashboard-content h2 {
        font-size: 1.3rem;
    }
    
    .dashboard-content select,
    .dashboard-content input {
        padding: 0.7rem 0.9rem;
        font-size: 0.9rem;
    }
    
    .dashboard-content button {
        padding: 0.7rem;
        font-size: 0.9rem;
    }
    
    .dashboard-content th,
    .dashboard-content td {
        padding: 8px;
        font-size: 0.85rem;
    }
    
    .dashboard-content table button {
        padding: 4px 8px;
        font-size: 0.75rem;
    }
}

/* ========== ANIMATION ========== */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.dashboard-content {
    animation: fadeInUp 0.4s ease-out;
}

/* ========== TOUCH-FRIENDLY ADJUSTMENTS ========== */
@media (hover: none) and (pointer: coarse) {
    .dashboard-content button:hover {
        transform: none;
    }
    
    .dashboard-content button:active {
        transform: scale(0.96);
    }
}
    </style>
    <title>Document</title>
</head>
<body>
      <div class="admin-dashboard">

        <!-- Sidebar containing navigation links for admin modules -->
        <div class="side-bar">
            <h1>Admin Dashboard</h1>

            <div class="pages-links">
                <ul>
                    <a href="../Admin.html"><li>Home</li></a>
                    <a href="./Category.html"><li>Category</li></a>
                    <a href="./Plants.html"><li>Add Plants</li></a>
                    <a href="./Order.html"><li>Order</li></a>
                    <a href="./OrderDetail.html"><li> Order Details</li></a>
                    <a href="./Payments.html"><li>Payments</li></a>
                    <a href="./Supplier.html"><li>Supplier</li></a>
                    <a href="./SupplierOrder.html"><li>Supplier Order</li></a>
                    <a href="./Maintenance.html"><li>Maintenance</li></a>
                    <a href="./Notification.html"><li>Notification</li></a>
                    
                </ul>
            </div>
        </div>
        

        
       <div class="dashboard-content">
       
           <h2>Notifications</h2>

<!-- FORM -->
<div style="background:#fff;padding:10px;margin-bottom:20px;">

    <input type="hidden" id="edit_id">

    <input type="number" id="user_id" placeholder="User ID">
    <input type="text" id="message" placeholder="Message">

    <select id="type">
        <option value="">Type</option>
        <option value="stock">Stock</option>
        <option value="maintenance">Maintenance</option>
        <option value="order">Order</option>
    </select>

    <input type="date" id="date">

    <button onclick="saveNotification()">Save</button>
</div>

<!-- TABLE -->
<table border="1" width="100%" cellpadding="10">
    <thead>
        <tr>
            <th>ID</th>
            <th>User</th>
            <th>Message</th>
            <th>Type</th>
            <th>Date</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody id="notificationTable"></tbody>
</table>
             
        </div>


    </div>
<script>

const API = "http://127.0.0.1:8000/api/notifications";


// ================= READ =================
function loadNotifications() {

fetch(API)
.then(res => res.json())
.then(data => {

let rows = "";

data.forEach(n => {

rows += `
<tr>
<td>${n.notification_id}</td>
<td>${n.user_id}</td>
<td>${n.message}</td>
<td>${n.type}</td>
<td>${new Date(n.date).toLocaleDateString()}</td>
<td>
<button onclick="editNotification(${n.notification_id}, ${n.user_id}, '${n.message}', '${n.type}', '${n.date}')">Edit</button>
<button onclick="deleteNotification(${n.notification_id})">Delete</button>
</td>
</tr>
`;

});

document.getElementById("notificationTable").innerHTML = rows;

});

}


// ================= SAVE (CREATE + UPDATE) =================
function saveNotification() {

let id = document.getElementById("edit_id").value;

let data = {
user_id: document.getElementById("user_id").value,
message: document.getElementById("message").value,
type: document.getElementById("type").value,
date: document.getElementById("date").value
};

let method = "POST";
let url = API;

if(id){
method = "PUT";
url = `${API}/${id}`;
}

fetch(url, {
method: method,
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify(data)
})
.then(res => res.json())
.then(() => {
alert("Saved");
clearForm();
loadNotifications();
});

}


// ================= EDIT =================
function editNotification(id, user_id, message, type, date) {

document.getElementById("edit_id").value = id;
document.getElementById("user_id").value = user_id;
document.getElementById("message").value = message;
document.getElementById("type").value = type;
document.getElementById("date").value = date;

}


// ================= DELETE =================
function deleteNotification(id) {

if(!confirm("Delete this notification?")) return;

fetch(`${API}/${id}`, {
method: "DELETE"
})
.then(res => res.json())
.then(() => {
alert("Deleted");
loadNotifications();
});

}


// ================= CLEAR =================
function clearForm() {

document.getElementById("edit_id").value = "";
document.getElementById("user_id").value = "";
document.getElementById("message").value = "";
document.getElementById("type").value = "";
document.getElementById("date").value = "";

}


// INIT
loadNotifications();

</script>
</body>
</html>
